<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YEEZY // Control System</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F7FB;--bg2:#FFF;--bg3:#EEF2F7;--surface:#FFF;
  --text:#071D2F;--dim:rgba(7,29,47,.6);--muted:rgba(7,29,47,.35);
  --red:#FF1919;--red-g:rgba(255,25,25,.08);--red-d:rgba(255,25,25,.4);
  --green:#16A34A;--green-g:rgba(22,163,74,.1);
  --amber:#D97706;--blue:#0A68F5;
  --border:rgba(7,29,47,.08);
  --font:'JetBrains Mono',monospace;--fd:'Space Grotesk',sans-serif;
  --ease:cubic-bezier(.625,.05,0,1);
}
::selection{background:var(--red);color:#fff}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:rgba(7,29,47,.12);border-radius:2px}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:13px;line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;background:repeating-linear-gradient(to bottom,transparent 0px,transparent 2px,rgba(0,0,0,.006) 2px,rgba(0,0,0,.006) 4px);animation:scan 8s linear infinite}
@keyframes scan{to{transform:translateY(12px)}}

.container{max-width:1400px;margin:0 auto;padding:0 24px}

/* ═══ HEADER ═══ */
.header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.header-inner{display:flex;align-items:center;height:52px;gap:0}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text);padding-right:24px;border-right:1px solid var(--border);margin-right:4px}
.logo-mark{font-size:11px;font-weight:800;letter-spacing:.15em;color:#fff;background:var(--red);padding:3px 8px}
.logo-text{font-family:var(--fd);font-weight:700;font-size:14px;letter-spacing:-.01em}

/* Nav */
.nav{display:flex;align-items:center;height:100%;gap:0;flex:1}
.nav-group{display:flex;align-items:center;height:100%;border-right:1px solid var(--border)}
.nav-group:last-child{border-right:none}
.nav-group-label{padding:0 12px;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);cursor:pointer;height:100%;display:flex;align-items:center;transition:color .2s}
.nav-group-label:hover,.nav-group-label.active{color:var(--red)}
.nav-sub{display:flex;height:100%}
.nav-btn{padding:0 10px;font-size:9px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;height:100%;display:flex;align-items:center;border-bottom:2px solid transparent;transition:all .2s var(--ease);text-decoration:none}
.nav-btn:hover{color:var(--text)}
.nav-btn.active{color:var(--red);border-bottom-color:var(--red)}

.header-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.pulse{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(22,163,74,.4);animation:pulseg 2s ease-in-out infinite}
@keyframes pulseg{0%,100%{opacity:1}50%{opacity:.4}}
.status-lbl{font-size:10px;color:var(--muted)}

/* ═══ PAGES ═══ */
.page{display:none;animation:pageIn .4s var(--ease)}.page.active{display:block}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.section{padding:32px 0}
.sec-label{font-size:9px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--red);margin-bottom:6px}
.sec-title{font-family:var(--fd);font-size:clamp(1.5rem,2.5vw,2.2rem);font-weight:700;letter-spacing:-.03em;line-height:1.1;margin-bottom:24px}

/* ═══ STATS ROW ═══ */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:1px;background:var(--border);border:1px solid var(--border);margin-bottom:32px}
.stat{background:var(--bg);padding:20px;transition:background .2s}.stat:hover{background:var(--bg2)}
.stat-v{font-family:var(--fd);font-size:28px;font-weight:800;letter-spacing:-.02em;line-height:1}
.stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.stat-t{font-size:10px;font-weight:600;margin-top:6px}
.t-up{color:var(--green)}.t-down{color:var(--red)}.t-flat{color:var(--muted)}

/* ═══ TABLE ═══ */
.tbl-wrap{border:1px solid var(--border);overflow-x:auto;margin-bottom:32px}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--bg3);position:sticky;top:0}
th{padding:10px 14px;text-align:left;font-size:8px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap}
th.c,td.c{text-align:center}
td{padding:12px 14px;border-bottom:1px solid var(--border);transition:background .1s}
tr:hover td{background:rgba(255,25,25,.02)}
.host{font-weight:600;font-size:13px}.cat{font-size:8px;font-weight:600;color:var(--red);background:var(--red-g);padding:2px 6px;letter-spacing:.05em;text-transform:uppercase;margin-left:6px;display:inline-block}
.sn{font-weight:700;font-size:13px}
.sc-p{color:var(--green)}.sc-h{color:var(--text)}.sc-m{color:var(--amber)}.sc-l{color:var(--red)}
.bar{display:block;height:3px;background:var(--bg3);margin-top:3px;overflow:hidden}.bar-f{height:100%;transition:width .6s var(--ease)}
.f-p{background:var(--green)}.f-h{background:var(--dim)}.f-m{background:var(--amber)}.f-l{background:var(--red)}

/* ═══ TIMELINE ═══ */
.timeline{display:flex;gap:2px;overflow-x:auto;padding-bottom:6px;margin-bottom:32px}
.tl{flex-shrink:0;padding:14px 18px;min-width:120px;background:var(--bg2);border:1px solid var(--border);text-align:center;transition:all .2s var(--ease)}
.tl:hover{border-color:var(--red-d)}.tl.latest{border-color:var(--red);box-shadow:0 4px 20px var(--red-g)}
.tl-v{font-size:10px;font-weight:700;color:var(--red);letter-spacing:.05em}.tl-s{font-family:var(--fd);font-size:24px;font-weight:800}.tl-d{font-size:10px;font-weight:600;margin-top:3px}.tl-n{font-size:8px;color:var(--muted);margin-top:4px;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ═══ UNIFIED LOGS ═══ */
.log-entry{display:grid;grid-template-columns:140px 70px 70px 1fr;gap:12px;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border);font-size:12px;transition:background .1s}
.log-entry:hover{background:rgba(255,25,25,.015)}
.log-time{font-size:10px;color:var(--muted);font-variant-numeric:tabular-nums}
.log-sys{font-size:8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:2px 6px;display:inline-block}
.log-sys.xray{color:var(--blue);background:rgba(10,104,245,.08)}
.log-sys.leads{color:var(--amber);background:rgba(217,119,6,.08)}
.log-sys.server{color:var(--muted);background:var(--bg3)}
.log-sys.bot{color:var(--red);background:var(--red-g)}
.log-status{font-size:8px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:2px 6px}
.log-status.success{color:var(--green);background:var(--green-g)}
.log-status.failure{color:var(--red);background:var(--red-g)}
.log-status.info{color:var(--blue);background:rgba(10,104,245,.06)}
.log-status.warning{color:var(--amber);background:rgba(217,119,6,.06)}
.log-status.healing{color:#9333EA;background:rgba(147,51,234,.06)}
.log-msg{font-size:12px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ═══ ARCHITECTURE — ANIMATED NODES ═══ */
.arch-canvas{position:relative;padding:40px 0;overflow-x:auto}
.node-grid{display:flex;flex-wrap:wrap;gap:20px;justify-content:center}
.node{position:relative;background:var(--bg2);border:1px solid var(--border);padding:20px;min-width:180px;max-width:240px;transition:all .3s var(--ease)}
.node:hover{border-color:var(--red);transform:translateY(-2px);box-shadow:0 8px 24px var(--red-g)}
.node-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.node-name{font-family:var(--fd);font-size:13px;font-weight:700;letter-spacing:-.01em}
.node-status{width:8px;height:8px;border-radius:50%}
.node-status.on{background:var(--green);box-shadow:0 0 6px rgba(22,163,74,.5);animation:pulseg 2s ease-in-out infinite}
.node-status.off{background:var(--muted)}
.node-status.busy{background:var(--amber);animation:pulseg 1s ease-in-out infinite}
.node-data{font-size:10px;color:var(--muted);line-height:1.8}
.node-data strong{color:var(--text);font-weight:600}
.node-tag{font-size:8px;font-weight:600;color:var(--red);background:var(--red-g);padding:1px 6px;letter-spacing:.05em;text-transform:uppercase;display:inline-block;margin:3px 3px 0 0}

/* Connection lines between nodes */
.conn-row{display:flex;align-items:center;justify-content:center;gap:0;margin:20px 0}
.conn-arrow{color:var(--red);font-size:18px;padding:0 8px;animation:arrowPulse 2s ease-in-out infinite}
@keyframes arrowPulse{0%,100%{opacity:1}50%{opacity:.3}}
.conn-line{width:40px;height:2px;background:linear-gradient(90deg,var(--red-g),var(--red-d),var(--red-g));animation:flowLine 2s linear infinite;background-size:200% 100%}
@keyframes flowLine{to{background-position:-200% 0}}

/* Pipeline flow */
.pipe-flow{display:flex;align-items:center;gap:0;overflow-x:auto;padding:16px 0;margin-bottom:24px}
.pipe-step{flex-shrink:0;padding:10px 16px;background:var(--bg2);border:1px solid var(--border);font-size:10px;font-weight:600;text-align:center;transition:all .3s}
.pipe-step:hover{border-color:var(--red);color:var(--red);background:var(--red-g)}
.pipe-step.active{border-color:var(--green);color:var(--green);background:var(--green-g)}
.pipe-arrow{flex-shrink:0;color:var(--red);font-size:14px;padding:0 6px;animation:arrowPulse 2s ease-in-out infinite}

/* ═══ FOOTER ═══ */
.footer{border-top:1px solid var(--border);padding:16px 0;margin-top:32px}
.footer-inner{display:flex;justify-content:space-between;font-size:9px;color:var(--muted);letter-spacing:.05em;text-transform:uppercase}
.footer-red{color:var(--red)}

@media(max-width:768px){
  .nav-sub{display:none}.stats{grid-template-columns:1fr 1fr}
  .log-entry{grid-template-columns:100px 60px 1fr;}.log-status{display:none}
  .header-right{display:none}
}
</style>
</head>
<body>

<header class="header">
<div class="container header-inner">
  <a class="logo" href="#"><span class="logo-mark">Y</span><span class="logo-text">YEEZY</span></a>
  <nav class="nav">
    <div class="nav-group">
      <span class="nav-group-label active" onclick="setSystem('main')">MAIN</span>
      <div class="nav-sub" data-sys="main">
        <a class="nav-btn active" onclick="go('main','dash')">Dashboard</a>
        <a class="nav-btn" onclick="go('main','logs')">Logs</a>
        <a class="nav-btn" onclick="go('main','arch')">Architecture</a>
      </div>
    </div>
    <div class="nav-group">
      <span class="nav-group-label" onclick="setSystem('xray')">X-RAY</span>
      <div class="nav-sub" data-sys="xray">
        <a class="nav-btn" onclick="go('xray','dash')">Dashboard</a>
        <a class="nav-btn" onclick="go('xray','logs')">Logs</a>
        <a class="nav-btn" onclick="go('xray','arch')">Architecture</a>
      </div>
    </div>
    <div class="nav-group">
      <span class="nav-group-label" onclick="setSystem('swapper')">SWAPPER</span>
      <div class="nav-sub" data-sys="swapper">
        <a class="nav-btn" onclick="go('swapper','dash')">Dashboard</a>
        <a class="nav-btn" onclick="go('swapper','logs')">Logs</a>
        <a class="nav-btn" onclick="go('swapper','arch')">Architecture</a>
      </div>
    </div>
  </nav>
  <div class="header-right">
    <div class="pulse" id="sDot"></div>
    <span class="status-lbl" id="sLbl">LOADING</span>
  </div>
</div>
</header>

<main class="container" id="app"></main>

<footer class="footer"><div class="container footer-inner">
  <span>YEEZY <span class="footer-red">// CONTROL SYSTEM</span></span>
  <span id="fTime">--</span>
</div></footer>

<script>
const A='/api';
let D={report:{},history:[],knowledge:{},sites:{},events:[],system:{}};
let curSys='main',curPage='dash';

function sc(v){return v>=95?'p':v>=75?'h':v>=50?'m':'l'}
function ago(d){if(!d)return'--';const s=Math.floor((Date.now()-new Date(d).getTime())/1000);if(s<60)return s+'s ago';if(s<3600)return Math.floor(s/60)+'m ago';if(s<86400)return Math.floor(s/3600)+'h ago';return Math.floor(s/86400)+'d ago'}
function ts(d){if(!d)return'--';const dt=new Date(d);return dt.toLocaleDateString('en-GB',{day:'2-digit',month:'short'})+' '+dt.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}

function go(sys,page){curSys=sys;curPage=page;render();
  document.querySelectorAll('.nav-group-label').forEach(n=>n.classList.toggle('active',n.textContent.toLowerCase().includes(sys==='main'?'main':sys)));
  document.querySelectorAll('.nav-btn').forEach(n=>n.classList.remove('active'));
  event?.target?.classList?.add('active');
}
function setSystem(sys){curSys=sys;curPage='dash';render();
  document.querySelectorAll('.nav-group-label').forEach(n=>n.classList.toggle('active',n.textContent.toLowerCase().includes(sys==='main'?'main':sys)));
  document.querySelectorAll('.nav-sub').forEach(s=>s.querySelectorAll('.nav-btn').forEach((b,i)=>b.classList.toggle('active',i===0&&s.dataset.sys===sys)));
}

async function load(){
  const [report,history,knowledge,sites,events,system]=await Promise.all([
    fetch(A+'/report').then(r=>r.json()).catch(()=>({})),
    fetch(A+'/history').then(r=>r.json()).catch(()=>[]),
    fetch(A+'/knowledge').then(r=>r.json()).catch(()=>({learnings:[],failed_approaches:[]})),
    fetch(A+'/sites').then(r=>r.json()).catch(()=>({active:[],mastered:[],queue:[]})),
    fetch(A+'/events').then(r=>r.json()).catch(()=>[]),
    fetch(A+'/system').then(r=>r.json()).catch(()=>({})),
  ]);
  D={report,history,knowledge,sites,events,system};
  document.getElementById('sLbl').textContent=(D.system.version||'--')+' // '+(D.system.cycleRunning?'CYCLE RUNNING':ago(D.report.date));
  document.getElementById('fTime').textContent=new Date().toLocaleString().toUpperCase();
  render();
}

function render(){
  const p=curSys+'-'+curPage;
  const R={
    'main-dash':renderMainDash,'main-logs':renderMainLogs,'main-arch':renderMainArch,
    'xray-dash':renderXrayDash,'xray-logs':renderXrayLogs,'xray-arch':renderXrayArch,
    'swapper-dash':renderSwapperDash,'swapper-logs':renderSwapperLogs,'swapper-arch':renderSwapperArch,
  };
  document.getElementById('app').innerHTML=(R[p]||renderMainDash)();
}

// ═══════════════════════════════════════
// MAIN
// ═══════════════════════════════════════

function renderMainDash(){
  const r=D.report,h=D.history,s=D.sites,sys=D.system;
  const scored=h.filter(x=>typeof x.score==='number');
  const last=scored[scored.length-1];
  return`<section class="section">
  <div class="sec-label">Yeezy Control System</div>
  <div class="sec-title">${r.averageScore||'--'}/100</div>
  <div class="stats">
    <div class="stat"><div class="stat-l">Score</div><div class="stat-v" style="color:var(--red)">${r.averageScore||'--'}</div><div class="stat-t ${(last?.diff||0)>0?'t-up':'t-flat'}">${last?.diff>0?'+':''}${last?.diff||0} last</div></div>
    <div class="stat"><div class="stat-l">Version</div><div class="stat-v" style="color:var(--red)">${sys.version||'--'}</div><div class="stat-t t-flat">${sys.cycleRunning?'RUNNING':'idle'}</div></div>
    <div class="stat"><div class="stat-l">Perfect</div><div class="stat-v" style="color:var(--green)">${r.perfectCount||0}</div><div class="stat-t t-flat">of ${r.totalSites||'--'}</div></div>
    <div class="stat"><div class="stat-l">Mastered</div><div class="stat-v">${s.mastered?.length||0}</div><div class="stat-t t-flat">${s.queue?.length||0} queued</div></div>
    <div class="stat"><div class="stat-l">Cycles</div><div class="stat-v">${scored.length}</div><div class="stat-t t-flat">${ago(r.date)}</div></div>
    <div class="stat"><div class="stat-l">Server</div><div class="stat-v" style="font-size:16px">${sys.diskUsed||'--'}</div><div class="stat-t t-flat">${sys.memUsed||'--'}</div></div>
  </div></section>
  <section class="section"><div class="sec-label">Version History</div>
  <div class="timeline">${scored.slice(-12).map((x,i,a)=>`<div class="tl ${i===a.length-1?'latest':''}"><div class="tl-v">${x.version?.toUpperCase()}</div><div class="tl-s sc-${sc(x.score)}">${x.score}</div><div class="tl-d ${x.diff>0?'t-up':x.diff<0?'t-down':'t-flat'}">${x.diff>0?'+':''}${x.diff??''}</div><div class="tl-n" title="${x.note||''}">${(x.note||'').slice(0,30)}</div></div>`).join('')}</div></section>
  <section class="section"><div class="sec-label">Recent Events</div>
  <div style="border:1px solid var(--border)">${(D.events||[]).slice(-15).reverse().map(e=>`<div class="log-entry"><span class="log-time">${ts(e.timestamp)}</span><span class="log-sys ${e.system}">${e.system}</span><span class="log-status ${e.status}">${e.status}</span><span class="log-msg">${e.message}</span></div>`).join('')||'<div style="padding:20px;color:var(--muted)">No events yet</div>'}</div></section>`;
}

function renderMainLogs(){
  const all=[];
  // Merge events + knowledge learnings + knowledge failures into unified log
  (D.events||[]).forEach(e=>all.push({t:e.timestamp,sys:e.system,status:e.status,msg:e.message}));
  (D.knowledge.learnings||[]).forEach(l=>all.push({t:l.date||'',sys:'xray',status:'success',msg:`[${l.version}] ${l.technique}: ${l.impact||l.detail||''}`}));
  (D.knowledge.failed_approaches||[]).forEach(f=>all.push({t:f.date||'',sys:'xray',status:'failure',msg:`[${f.version}] ${f.technique||'attempt'}: ${f.reason||f.detail||''}`}));
  // Sort by timestamp desc
  all.sort((a,b)=>new Date(b.t)-new Date(a.t));
  return`<section class="section"><div class="sec-label">All System Logs</div><div class="sec-title">Unified Log</div>
  <div style="border:1px solid var(--border);max-height:70vh;overflow-y:auto">${all.slice(0,100).map(e=>`<div class="log-entry"><span class="log-time">${ts(e.t)}</span><span class="log-sys ${e.sys}">${e.sys}</span><span class="log-status ${e.status}">${e.status}</span><span class="log-msg">${e.msg}</span></div>`).join('')||'<div style="padding:20px;color:var(--muted)">No logs yet</div>'}</div></section>`;
}

function renderMainArch(){
  const sys=D.system;
  return`<section class="section"><div class="sec-label">System Architecture</div><div class="sec-title">Live System Map</div>
  <div class="node-grid">
    <div class="node"><div class="node-header"><span class="node-name">Hetzner Server</span><span class="node-status on"></span></div><div class="node-data"><strong>Uptime:</strong> ${sys.uptime||'--'}<br><strong>Disk:</strong> ${sys.diskUsed||'--'}<br><strong>RAM:</strong> ${sys.memUsed||'--'}<br><strong>Chromium:</strong> ${sys.chromiumProcesses||0} procs</div></div>
    <div class="node"><div class="node-header"><span class="node-name">Dashboard</span><span class="node-status ${sys.services?.dashboard?'on':'off'}"></span></div><div class="node-data"><strong>Port:</strong> 3847<br><strong>Status:</strong> ${sys.services?.dashboard?'OK':'DOWN'}</div></div>
    <div class="node"><div class="node-header"><span class="node-name">Operator Bot</span><span class="node-status ${sys.services?.bot?'on':'off'}"></span></div><div class="node-data"><strong>Telegram:</strong> @xrayevolve_bot<br><strong>Self-heal:</strong> active<br><strong>Checks:</strong> every 5m</div></div>
    <div class="node"><div class="node-header"><span class="node-name">Supabase</span><span class="node-status on"></span></div><div class="node-data"><strong>Table:</strong> us_leads<br><strong>Project:</strong> cywmdjl...</div></div>
  </div>
  <div class="conn-row"><span class="conn-arrow">&darr;</span><div class="conn-line"></div><span class="conn-arrow">&darr;</span><div class="conn-line"></div><span class="conn-arrow">&darr;</span></div>
  <div class="node-grid">
    <div class="node"><div class="node-header"><span class="node-name">X-Ray Engine</span><span class="node-status ${sys.cycleRunning?'busy':'on'}"></span></div><div class="node-data"><strong>Version:</strong> ${sys.version||'--'}<br><strong>Next cycle:</strong> ${sys.nextXrayCycle||'--'}<br><strong>Evolution:</strong> every 6h</div><div class="node-tag">cloner</div><div class="node-tag">self-improving</div></div>
    <div class="node"><div class="node-header"><span class="node-name">Lead Machine</span><span class="node-status on"></span></div><div class="node-data"><strong>Next scrape:</strong> ${sys.nextScrape||'--'}<br><strong>Segments:</strong> 4 (law, dental, RE, constr)<br><strong>Cities:</strong> 20 US</div><div class="node-tag">scraper</div><div class="node-tag">scorer</div></div>

function renderXrayDash(){
  const r=D.report,h=D.history,s=D.sites,sys=D.system;
  const scored=h.filter(x=>typeof x.score==='number');
  const sites=r.sites||[];
  const sorted=[...sites].sort((a,b)=>a.totalScore-b.totalScore);
  const cell=(m)=>{const v=m?.score??0;return`<td class="c"><span class="sn sc-${sc(v)}">${v}</span><span class="bar"><span class="bar-f f-${sc(v)}" style="width:${v}%"></span></span></td>`};
  return`<section class="section"><div class="sec-label">X-Ray Cloner</div><div class="sec-title">${r.averageScore||'--'}/100 — ${sys.version||'--'}</div>
  <div class="stats">
    <div class="stat"><div class="stat-l">Score</div><div class="stat-v" style="color:var(--red)">${r.averageScore||'--'}</div></div>
    <div class="stat"><div class="stat-l">Perfect</div><div class="stat-v" style="color:var(--green)">${r.perfectCount||0}</div></div>
    <div class="stat"><div class="stat-l">Active</div><div class="stat-v">${s.active?.length||0}</div></div>
    <div class="stat"><div class="stat-l">Mastered</div><div class="stat-v">${s.mastered?.length||0}</div></div>
    <div class="stat"><div class="stat-l">Queue</div><div class="stat-v">${s.queue?.length||0}</div></div>
  </div></section>
  <section class="section"><div class="sec-label">Version History</div>
  <div class="timeline">${scored.slice(-12).map((x,i,a)=>`<div class="tl ${i===a.length-1?'latest':''}"><div class="tl-v">${x.version?.toUpperCase()}</div><div class="tl-s sc-${sc(x.score)}">${x.score}</div><div class="tl-d ${x.diff>0?'t-up':x.diff<0?'t-down':'t-flat'}">${x.diff>0?'+':''}${x.diff??''}</div></div>`).join('')}</div></section>
  <section class="section"><div class="sec-label">Per-Site Scores</div>
  <div class="tbl-wrap"><table><thead><tr><th>Site</th><th class="c">Total</th><th class="c">Img</th><th class="c">Px</th><th class="c">CSS</th><th class="c">Link</th><th class="c">Content</th><th class="c">Layout</th><th class="c">Console</th></tr></thead><tbody>${sorted.map(s=>{const h=new URL(s.site).hostname,m=s.metrics||{};return`<tr><td><span class="host">${h}</span><span class="cat">${s.category||''}</span></td><td class="c"><span class="sn sc-${sc(s.totalScore)}" style="font-size:15px">${s.totalScore}</span></td>${cell(m.images)}${cell(m.pixels)}${cell(m.css)}${cell(m.links)}${cell(m.content)}${cell(m.layout)}${cell(m.console)}</tr>`}).join('')}</tbody></table></div></section>
  <section class="section"><div class="sec-label">Cycle History</div>
  <div class="tbl-wrap"><table><thead><tr><th>Version</th><th class="c">Score</th><th class="c">Prev</th><th class="c">Diff</th><th>Date</th><th>Notes</th></tr></thead><tbody>${[...h].reverse().map(x=>`<tr><td style="color:var(--red);font-weight:700">${x.version||'--'}</td><td class="c"><span class="sn sc-${sc(x.score||0)}">${x.score??'--'}</span></td><td class="c" style="color:var(--muted)">${x.prev_score??'--'}</td><td class="c"><span class="${(x.diff||0)>0?'t-up':(x.diff||0)<0?'t-down':'t-flat'}">${x.diff!=null?(x.diff>0?'+':'')+x.diff:'--'}</span></td><td style="color:var(--muted);font-size:11px">${x.date?new Date(x.date).toLocaleDateString():'--'}</td><td style="color:var(--dim);font-size:11px;max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${x.note||''}">${x.note||'--'}</td></tr>`).join('')}</tbody></table></div></section>`;
}

function renderXrayLogs(){
  const all=[];
  (D.events||[]).filter(e=>e.system==='xray').forEach(e=>all.push({t:e.timestamp,status:e.status,msg:e.message}));
  (D.knowledge.learnings||[]).forEach(l=>all.push({t:l.date||'',status:'success',msg:`${l.version}: ${l.technique} — ${l.impact||l.detail||''}`}));
  (D.knowledge.failed_approaches||[]).forEach(f=>all.push({t:f.date||'',status:'failure',msg:`${f.version}: ${f.technique||'attempt'} — ${f.reason||f.detail||''}`}));
  all.sort((a,b)=>new Date(b.t)-new Date(a.t));
  return`<section class="section"><div class="sec-label">X-Ray Logs</div><div class="sec-title">Evolution Log</div>
  <div style="border:1px solid var(--border);max-height:70vh;overflow-y:auto">${all.slice(0,100).map(e=>`<div class="log-entry" style="grid-template-columns:140px 70px 1fr"><span class="log-time">${ts(e.t)}</span><span class="log-status ${e.status}">${e.status}</span><span class="log-msg">${e.msg}</span></div>`).join('')||'<div style="padding:20px;color:var(--muted)">No X-Ray logs yet</div>'}</div></section>`;
}

  const sys=D.system;
  return`<section class="section"><div class="sec-label">X-Ray Architecture</div><div class="sec-title">Evolution Pipeline</div>
  <div class="pipe-flow">
    <div class="pipe-step ${sys.cycleRunning?'active':''}">HEALTH<br>CHECK</div><span class="pipe-arrow">&rarr;</span>
    <div class="pipe-step">CLONE<br>8 SITES</div><span class="pipe-arrow">&rarr;</span>

    <div class="pipe-step">RETEST<br>VERIFY</div><span class="pipe-arrow">&rarr;</span>

    <div class="node"><div class="node-header"><span class="node-name">Scoring</span><span class="node-status on"></span></div><div class="node-data"><strong>Images:</strong> 15%<br><strong>Pixels:</strong> 15%<br><strong>CSS:</strong> 12%<br><strong>Links:</strong> 12%<br><strong>Content:</strong> 12%<br><strong>Layout:</strong> 10%<br><strong>Interact:</strong> 8%<br><strong>Console:</strong> 8%<br><strong>Manifest:</strong> 8%</div></div>
    <div class="node"><div class="node-header"><span class="node-name">Learning</span><span class="node-status on"></span></div><div class="node-data"><strong>Knowledge base:</strong> ${D.knowledge.learnings?.length||0} learnings<br><strong>Failed:</strong> ${D.knowledge.failed_approaches?.length||0}<br><strong>Retry:</strong> 2 attempts/cycle<br><strong>Plateau detect:</strong> active</div></div>
    <div class="node"><div class="node-header"><span class="node-name">Rotation</span><span class="node-status on"></span></div><div class="node-data"><strong>Active:</strong> ${D.sites.active?.length||0} sites<br><strong>Mastered:</strong> ${D.sites.mastered?.length||0} locked<br><strong>Queue:</strong> ${D.sites.queue?.length||0} waiting<br><strong>Next cycle:</strong> ${sys.nextXrayCycle||'--'}</div></div>
  </div></section>`;
}
